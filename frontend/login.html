<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRS-FULL — Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 40px;
            margin-bottom: 10px;
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .subtitulo {
            color: #999;
            font-size: 12px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-bottom: 12px;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .link-cadastro {
            text-align: center;
            color: #667eea;
            font-size: 14px;
            text-decoration: none;
            cursor: pointer;
        }

        .link-cadastro:hover {
            text-decoration: underline;
        }

        .mensagem {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .mensagem.erro {
            background: #ffebee;
            color: #c62828;
            display: block;
        }

        .mensagem.sucesso {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-size: 12px;
            margin-top: 10px;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #667eea;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🔊</div>
            <h1>CRS-FULL</h1>
            <p class="subtitulo">Medidor Acústico ELAYON</p>
        </div>

        <div id="mensagem" class="mensagem"></div>

        <form id="formLogin">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="seu@email.com">
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn">Entrar</button>

            <div class="loading" id="loading">
                <span class="spinner"></span>Processando...
            </div>
        </form>

        <p style="text-align: center; color: #999; font-size: 14px; margin-top: 20px;">
            Não tem conta? <a href="cadastro.html" class="link-cadastro">Cadastre-se aqui</a>
        </p>
    </div>

    <script>
        const form = document.getElementById('formLogin');
        const mensagem = document.getElementById('mensagem');
        const loading = document.getElementById('loading');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            console.log('[CRS-FULL] Login iniciado para:', email);

            loading.style.display = 'block';
            mensagem.className = 'mensagem';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, senha })
                });

                const data = await response.json();

                if (response.ok) {
                    console.log('[CRS-FULL] Login bem-sucedido');
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('usuario', JSON.stringify(data.usuario));
                    
                    mensagem.className = 'mensagem sucesso';
                    mensagem.textContent = 'Login bem-sucedido! Redirecionando...';
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    console.error('[CRS-FULL] Erro de login:', data.mensagem);
                    mensagem.className = 'mensagem erro';
                    mensagem.textContent = data.mensagem || 'Erro ao fazer login';
                }
            } catch (erro) {
                console.error('[CRS-FULL] Erro de conexão:', erro);
                mensagem.className = 'mensagem erro';
                mensagem.textContent = 'Erro de conexão. Tente novamente.';
            } finally {
                loading.style.display = 'none';
            }
        });

        console.log('🔊 CRS-FULL — Tela de Login Carregada');
    </script>
</body>
</html>
