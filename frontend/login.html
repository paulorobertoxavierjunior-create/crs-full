<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRS-FULL — Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            display: none;
        }

        .card.active {
            display: block;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            color: #999;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .toggle-text {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .toggle-text a {
            color: #667eea;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
        }

        .toggle-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- TELA DE LOGIN -->
        <div class="card active" id="login-card">
            <div class="header">
                <h1>🔊 CRS-FULL</h1>
                <p>Sistema de Medição Acústica</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="login-senha">Senha</label>
                    <input type="password" id="login-senha" placeholder="Sua senha" required>
                </div>

                <button type="submit">Entrar</button>
            </form>

            <div class="toggle-text">
                Não tem conta? <a onclick="toggleCards()">Criar conta</a>
            </div>
        </div>

        <!-- TELA DE REGISTRO -->
        <div class="card" id="registro-card">
            <div class="header">
                <h1>🔊 CRS-FULL</h1>
                <p>Criar nova conta</p>
            </div>

            <form id="registro-form">
                <div class="form-group">
                    <label for="registro-nome">Nome completo</label>
                    <input type="text" id="registro-nome" placeholder="Seu nome" required>
                </div>

                <div class="form-group">
                    <label for="registro-email">Email</label>
                    <input type="email" id="registro-email" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="registro-senha">Senha</label>
                    <input type="password" id="registro-senha" placeholder="Mínimo 6 caracteres" required>
                </div>

                <button type="submit">Criar conta</button>
            </form>

            <div class="toggle-text">
                Já tem conta? <a onclick="toggleCards()">Fazer login</a>
            </div>
        </div>
    </div>

    <script>
        // Avanço Rápido: Login Aberto para Testes e Treinamento
        
        // Se clicar em Entrar no formulário de Login, vai direto
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            localStorage.setItem('token', 'modo-treinamento-ativo');
            localStorage.setItem('usuario', JSON.stringify({ email: 'usuario.treinamento@elayon.com' }));
            window.location.href = 'dashboard.html';
        });

        // Se clicar em Criar Conta no formulário de Registro, também vai direto
        document.getElementById('registro-form').addEventListener('submit', (e) => {
            e.preventDefault();
            localStorage.setItem('token', 'modo-treinamento-ativo');
            localStorage.setItem('usuario', JSON.stringify({ email: 'usuario.treinamento@elayon.com' }));
            window.location.href = 'dashboard.html';
        });

        // Toggle simples entre as telas para não quebrar o visual
        function toggleCards() {
            document.getElementById('login-card').classList.toggle('active');
            document.getElementById('registro-card').classList.toggle('active');
        }
    </script>
</body>
</html>
