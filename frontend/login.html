<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRS-FULL — Login</title>
    <style>
        /* Mantenha os estilos que você já tinha, eles são bons! */
        /* Certifique-se de que os estilos para .card, .card.active, .dashboard, etc. estejam aqui */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            display: none; /* Por padrão, oculto */
        }

        .card.active {
            display: block; /* Ativa o card */
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            color: #999;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .toggle-text {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }

        .toggle-text a {
            color: #667eea;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
        }

        .toggle-text a:hover {
            text-decoration: underline;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .success {
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- TELA DE LOGIN -->
        <div class="card active" id="login-card">
            <div class="header">
                <h1>🔊 CRS-FULL</h1>
                <p>Sistema de Medição Acústica</p>
            </div>

            <div class="error" id="login-error"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="login-senha">Senha</label>
                    <input type="password" id="login-senha" placeholder="Sua senha" required>
                </div>

                <button type="submit">Entrar</button>
            </form>

            <div class="toggle-text">
                Não tem conta? <a onclick="toggleCards()">Criar conta</a>
            </div>
        </div>

        <!-- TELA DE REGISTRO -->
        <div class="card" id="registro-card">
            <div class="header">
                <h1>🔊 CRS-FULL</h1>
                <p>Criar nova conta</p>
            </div>

            <div class="error" id="registro-error"></div>
            <div class="success" id="registro-success"></div>

            <form id="registro-form">
                <div class="form-group">
                    <label for="registro-nome">Nome completo</label>
                    <input type="text" id="registro-nome" placeholder="Seu nome" required>
                </div>

                <div class="form-group">
                    <label for="registro-email">Email</label>
                    <input type="email" id="registro-email" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="registro-senha">Senha</label>
                    <input type="password" id="registro-senha" placeholder="Mínimo 6 caracteres" required>
                </div>

                <button type="submit">Criar conta</button>
            </form>

            <div class="toggle-text">
                Já tem conta? <a onclick="toggleCards()">Fazer login</a>
            </div>
        </div>
    </div>

    <script>
        // ATENÇÃO: AQUI ESTÁ A CORREÇÃO DA URL DO BACKEND!
        const API_URL = 'https://crs-full3.onrender.com/api'; 
        
        // Verifica se já existe um token e redireciona para o dashboard se sim
        if (localStorage.getItem('token')) {
            window.location.href = 'dashboard.html'; // Redireciona para o dashboard
        }

        // Toggle entre login e registro
        function toggleCards() {
            document.getElementById('login-card').classList.toggle('active');
            document.getElementById('registro-card').classList.toggle('active');
            limparMensagens();
        }

        // Limpar mensagens de erro/sucesso
        function limparMensagens() {
            document.getElementById('login-error').classList.remove('show');
            document.getElementById('registro-error').classList.remove('show');
            document.getElementById('registro-success').classList.remove('show');
        }

        // REGISTRO
        document.getElementById('registro-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            limparMensagens();

            const nome = document.getElementById('registro-nome').value;
            const email = document.getElementById('registro-email').value;
            const senha = document.getElementById('registro-senha').value;

            try {
                const response = await fetch(`${API_URL}/auth/registro`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, senha })
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('registro-success').textContent = '✅ Conta criada com sucesso! Faça login.';
                    document.getElementById('registro-success').classList.add('show');
                    document.getElementById('registro-form').reset();
                    setTimeout(() => toggleCards(), 2000); // Volta para o login após 2 segundos
                } else {
                    throw new Error(data.mensagem || 'Erro ao registrar');
                }
            } catch (erro) {
                document.getElementById('registro-error').textContent = '❌ ' + erro.message;
                document.getElementById('registro-error').classList.add('show');
            }
        });

        // LOGIN
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            limparMensagens();

            const email = document.getElementById('login-email').value;
            const senha = document.getElementById('login-senha').value;

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('usuario', JSON.stringify(data.usuario));
                    window.location.href = 'dashboard.html'; // Redireciona para o dashboard
                } else {
                    throw new Error(data.mensagem || 'Erro ao fazer login');
                }
            } catch (erro) {
                document.getElementById('login-error').textContent = '❌ ' + erro.message;
                document.getElementById('login-error').classList.add('show');
            }
        });
    </script>
</body>
</html>
