<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRS-FULL — Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .logo-header {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-name {
            font-size: 14px;
            color: #666;
        }

        .btn-logout {
            padding: 8px 16px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.3s;
        }

        .btn-logout:hover {
            background: #c0392b;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .btn {
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s;
            width: 100%;
            margin-bottom: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .sessoes-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .sessao-item {
            padding: 12px;
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            margin-bottom: 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .sessao-item:hover {
            background: #f0f0f0;
        }

        .sessao-nome {
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .sessao-data {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }

        .sessao-metricas {
            font-size: 11px;
            color: #666;
            margin-top: 6px;
        }

        .vazio {
            text-align: center;
            color: #999;
            padding: 20px;
            font-size: 13px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
        }

        .stat-numero {
            font-size: 28px;
            font-weight: bold;
        }

        .stat-label {
            font-size: 12px;
            margin-top: 5px;
            opacity: 0.9;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .mensagem {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
            display: none;
        }

        .mensagem.sucesso {
            display: block;
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .mensagem.erro {
            display: block;
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <div class="logo-header">🔊 CRS-FULL</div>
            <div class="user-info">
                <div class="user-name">Bem-vindo, <span id="nomeUsuario">Usuário</span></div>
                <button class="btn-logout" onclick="fazerLogout()">Sair</button>
            </div>
        </div>

        <!-- MENSAGEM -->
        <div id="mensagem" class="mensagem"></div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <!-- NOVA SESSÃO -->
            <div class="card">
                <h2>📝 Nova Sessão</h2>
                <p style="font-size: 13px; color: #666; margin-bottom: 15px;">Inicie uma nova sessão de gravação e análise acústica.</p>
                <button class="btn" onclick="irParaGravacao()">Iniciar Gravação</button>
                <button class="btn" style="background: #27ae60;" onclick="irParaChat()">Chat com IA</button>
            </div>

            <!-- ESTATÍSTICAS -->
            <div class="card">
                <h2>📊 Estatísticas</h2>
                <div class="stats">
                    <div class="stat-box">
                        <div class="stat-numero" id="totalSessoes">0</div>
                        <div class="stat-label">Sessões</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-numero" id="totalMinutos">0</div>
                        <div class="stat-label">Minutos</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- SESSÕES RECENTES -->
        <div class="card">
            <h2>📋 Sessões Recentes (Até 10)</h2>
            <div id="loading" class="loading">
                <div class="spinner"></div>
                Carregando sessões...
            </div>
            <div id="listaHistorico" class="sessoes-list">
                <p class="vazio">Nenhuma sessão registrada ainda.</p>
            </div>
        </div>
    </div>

    <script>
        // Verificar autenticação
        function verificarAutenticacao() {
            const token = localStorage.getItem('token');
            const usuario = localStorage.getItem('usuario');

            if (!token || !usuario) {
                console.log('[CRS-FULL] Usuário não autenticado. Redirecionando...');
                window.location.href = 'login.html';
                return;
            }

            const dados = JSON.parse(usuario);
            document.getElementById('nomeUsuario').textContent = dados.nome || 'Usuário';
            console.log('[CRS-FULL] Usuário autenticado:', dados.email);
        }

        // Fazer logout
        function fazerLogout() {
            console.log('[CRS-FULL] Logout iniciado');
            localStorage.removeItem('token');
            localStorage.removeItem('usuario');
            window.location.href = 'login.html';
        }

        // Ir para gravação
        function irParaGravacao() {
            console.log('[CRS-FULL] Navegando para gravação');
            window.location.href = 'gravacao.html';
        }

        // Ir para chat
        function irParaChat() {
            console.log('[CRS-FULL] Navegando para chat');
            window.location.href = 'chat.html';
        }

        // Carregar sessões
        async function carregarSessoes() {
            const loading = document.getElementById('loading');
            const lista = document.getElementById('listaHistorico');
            const mensagem = document.getElementById('mensagem');

            loading.style.display = 'block';
            lista.innerHTML = '';

            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/api/sessoes/listar?limite=10', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();

                if (response.ok && data.sessoes && data.sessoes.length > 0) {
                    console.log('[CRS-FULL] Sessões carregadas:', data.sessoes.length);

                    let totalMinutos = 0;
                    lista.innerHTML = data.sessoes.map(sessao => {
                        const duracao = Math.round(sessao.duracao / 60);
                        totalMinutos += duracao;

                        return `
                            <div class="sessao-item" onclick="abrirSessao('${sessao.id}')">
                                <div class="sessao-nome">${sessao.nome || 'Sessão sem título'}</div>
                                <div class="sessao-data">${new Date(sessao.data_criacao).toLocaleDateString('pt-BR')}</div>
                                <div class="sessao-metricas">
                                    ⏱️ ${duracao}min | 🔊 ${sessao.silencio_pct || 0}% silêncio | 🎯 ${sessao.hesitacao_pct || 0}% hesitação
                                </div>
                            </div>
                        `;
                    }).join('');

                    document.getElementById('totalSessoes').textContent = data.sessoes.length;
                    document.getElementById('totalMinutos').textContent = totalMinutos;
                } else {
                    lista.innerHTML = '<p class="vazio">Nenhuma sessão registrada ainda.</p>';
                    document.getElementById('totalSessoes').textContent = '0';
                    document.getElementById('totalMinutos').textContent = '0';
                }
            } catch (erro) {
                console.error('[CRS-FULL] Erro ao carregar sessões:', erro);
                mensagem.className = 'mensagem erro';
                mensagem.textContent = 'Erro ao carregar sessões. Tente novamente.';
                lista.innerHTML = '<p class="vazio">Erro ao carregar sessões.</p>';
            } finally {
                loading.style.display = 'none';
            }
        }

        // Abrir sessão
        function abrirSessao(id) {
            console.log('[CRS-FULL] Abrindo sessão:', id);
            window.location.href = `relatorio.html?id=${id}`;
        }

        // Inicializar
        document.addEventListener('DOMContentLoaded', () => {
            console.log('🔊 CRS-FULL — Dashboard Carregado');
            verificarAutenticacao();
            carregarSessoes();
        });
    </script>
</body>
</html>
