<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRS-FULL — Dashboard</title>
    <style>
        /* Mantenha os estilos que você já tinha para o dashboard */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px; /* Aumentei um pouco para o dashboard */
            padding: 20px;
        }

        .dashboard-card { /* Renomeei para evitar conflito com .card de login */
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .dashboard-header h2 {
            color: #333;
            font-size: 28px;
        }

        .logout-btn {
            background: #ff6b6b;
            padding: 8px 16px;
            font-size: 14px;
            width: auto;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .logout-btn:hover {
            background: #ff5252;
            transform: translateY(-2px);
        }

        .session-form {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 30px;
        }

        .session-form h3 {
            color: #333;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit; /* Para textarea */
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
        }

        .sessions-list {
            margin-top: 30px;
        }

        .sessions-list h3 {
            color: #333;
            margin-bottom: 15px;
        }

        #sessoes-container {
            max-height: 400px; /* Limita a altura para scroll */
            overflow-y: auto;
            padding-right: 10px; /* Espaço para a barra de rolagem */
        }

        .session-item {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .session-item p {
            color: #666;
            font-size: 14px;
            margin: 5px 0;
        }

        .session-item strong {
            color: #333;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="dashboard-card">
            <div class="dashboard-header">
                <div>
                    <h2>Dashboard</h2>
                    <p id="usuario-nome" style="color: #999; font-size: 14px;"></p>
                </div>
                <button class="logout-btn" onclick="logout()">Sair</button>
            </div>

            <div class="session-form">
                <h3>Nova Sessão</h3>
                <form id="sessao-form">
                    <div class="form-group">
                        <label for="sessao-nome">Nome do Paciente</label>
                        <input type="text" id="sessao-nome" placeholder="Nome do paciente" required>
                    </div>

                    <div class="form-group">
                        <label for="sessao-descricao">Observações</label>
                        <textarea id="sessao-descricao" placeholder="Notas adicionais" rows="3"></textarea>
                    </div>

                    <button type="submit">Iniciar Sessão</button>
                </form>
            </div>

            <div class="sessions-list">
                <h3>Histórico de Sessões</h3>
                <div id="sessoes-container">
                    <p class="loading">Carregando sessões...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ATENÇÃO: AQUI ESTÁ A CORREÇÃO DA URL DO BACKEND!
        const API_URL = 'https://crs-full3.onrender.com/api'; 
        let token = localStorage.getItem('token');
        let usuario = JSON.parse(localStorage.getItem('usuario') || '{}');

        // Redireciona para login se não houver token
        if (!token) {
            window.location.href = 'login.html';
        } else {
            document.getElementById('usuario-nome').textContent = `Bem-vindo, ${usuario.nome}!`;
            carregarSessoes();
        }

        // Criar Sessão
        document.getElementById('sessao-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const nome = document.getElementById('sessao-nome').value;
            const descricao = document.getElementById('sessao-descricao').value;

            try {
                const response = await fetch(`${API_URL}/sessoes`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ nome, descricao })
                });

                if (response.ok) {
                    document.getElementById('sessao-form').reset();
                    carregarSessoes();
                } else {
                    // Se o token expirou ou é inválido, redireciona para login
                    if (response.status === 401 || response.status === 403) {
                        alert('Sua sessão expirou. Faça login novamente.');
                        logout();
                    } else {
                        alert('Erro ao criar sessão');
                    }
                }
            } catch (erro) {
                alert('Erro de rede: ' + erro.message);
            }
        });

        // Carregar Sessões
        async function carregarSessoes() {
            const container = document.getElementById('sessoes-container');
            container.innerHTML = '<p class="loading">Carregando sessões...</p>'; // Mostra loading

            try {
                const response = await fetch(`${API_URL}/sessoes`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();
                
                if (response.ok) {
                    if (data.sessoes.length === 0) {
                        container.innerHTML = '<p style="color: #999;">Nenhuma sessão registrada ainda.</p>';
                    } else {
                        container.innerHTML = data.sessoes.map(s => `
                            <div class="session-item">
                                <strong>${s.nome || 'Sem nome'}</strong>
                                <p>📝 ${s.descricao || 'Sem observações'}</p>
                                <p>⏱️ Duração: ${s.duracao || 'N/A'} segundos</p>
                                <p>🔇 Silêncio: ${s.silencio_pct}%</p>
                                <p>📅 ${new Date(s.data_criacao).toLocaleDateString('pt-BR')}</p>
                            </div>
                        `).join('');
                    }
                } else {
                    // Se o token expirou ou é inválido, redireciona para login
                    if (response.status === 401 || response.status === 403) {
                        alert('Sua sessão expirou. Faça login novamente.');
                        logout();
                    } else {
                        container.innerHTML = '<p class="error">Erro ao carregar sessões.</p>';
                        console.error('Erro ao carregar sessões:', data.mensagem || 'Erro desconhecido');
                    }
                }
            } catch (erro) {
                container.innerHTML = '<p class="error">Erro de rede ao carregar sessões.</p>';
                console.error('Erro de rede ao carregar sessões:', erro);
            }
        }

        // Logout
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('usuario');
            window.location.href = 'login.html'; // Redireciona para a página de login
        }
    </script>
</body>
</html>
