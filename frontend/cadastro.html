<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRS-FULL — Cadastro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 40px;
            margin-bottom: 10px;
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .subtitulo {
            color: #999;
            font-size: 12px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-bottom: 12px;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .loading {
            display: none;
            text-align: center;
            margin: 15px 0;
            font-size: 12px;
            color: #667eea;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .mensagem {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
            text-align: center;
            display: none;
        }

        .mensagem.sucesso {
            display: block;
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .mensagem.erro {
            display: block;
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #999;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        input[type="checkbox"] {
            width: auto;
            margin-right: 8px;
            cursor: pointer;
        }

        .checkbox-label {
            font-size: 12px;
            color: #666;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🔊</div>
            <h1>CRS-FULL</h1>
            <p class="subtitulo">Crie sua conta</p>
        </div>

        <div id="mensagem" class="mensagem"></div>

        <form id="formCadastro">
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" required placeholder="Seu nome">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="seu@email.com">
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" required placeholder="Mínimo 8 caracteres">
            </div>

            <div class="form-group">
                <label for="confirmaSenha">Confirmar Senha</label>
                <input type="password" id="confirmaSenha" name="confirmaSenha" required placeholder="Repita a senha">
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="termos" name="termos" required>
                <label for="termos" class="checkbox-label">Concordo com os termos de uso</label>
            </div>

            <button type="submit" class="btn">Criar Conta</button>

            <div id="loading" class="loading">
                <div class="spinner"></div>
                Processando...
            </div>
        </form>

        <div class="footer">
            <p>Já tem conta? <a href="login.html" class="link-login">Faça login aqui</a></p>
        </div>
    </div>

    <script>
        const form = document.getElementById('formCadastro');
        const mensagem = document.getElementById('mensagem');
        const loading = document.getElementById('loading');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const confirmaSenha = document.getElementById('confirmaSenha').value;

            console.log('[CRS-FULL] Cadastro iniciado para:', email);

            if (senha !== confirmaSenha) {
                mensagem.className = 'mensagem erro';
                mensagem.textContent = 'As senhas não coincidem';
                return;
            }

            if (senha.length < 8) {
                mensagem.className = 'mensagem erro';
                mensagem.textContent = 'A senha deve ter no mínimo 8 caracteres';
                return;
            }

            loading.style.display = 'block';
            mensagem.className = 'mensagem';

            try {
                const response = await fetch('/api/auth/cadastro', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ nome, email, senha })
                });

                const data = await response.json();

                if (response.ok) {
                    console.log('[CRS-FULL] Cadastro bem-sucedido');
                    mensagem.className = 'mensagem sucesso';
                    mensagem.textContent = 'Cadastro realizado! Redirecionando para login...';
                    
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    console.error('[CRS-FULL] Erro de cadastro:', data.mensagem);
                    mensagem.className = 'mensagem erro';
                    mensagem.textContent = data.mensagem || 'Erro ao criar conta';
                }
            } catch (erro) {
                console.error('[CRS-FULL] Erro de conexão:', erro);
                mensagem.className = 'mensagem erro';
                mensagem.textContent = 'Erro de conexão. Tente novamente.';
            } finally {
                loading.style.display = 'none';
            }
        });

        console.log('🔊 CRS-FULL — Tela de Cadastro Carregada');
    </script>
</body>
</html>
