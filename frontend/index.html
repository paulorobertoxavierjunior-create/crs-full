<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRS-FULL — Iniciar Simbiose</title>
    <style>
        /* Estilos gerais */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        p {
            font-size: 1.2em;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn-simbiose {
            display: inline-block;
            padding: 15px 30px;
            background: white;
            color: #764ba2;
            border: none;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        .btn-simbiose:hover {
            background: #e0e0e0;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }
        .logo-img {
            max-width: 150px; /* Ajuste conforme o tamanho da sua logo */
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="IMG-20260503-WA0018.jpg" alt="Logo CRS-FULL" class="logo-img">
        <h1>CRS-FULL</h1>
        <p>
            Bem-vindo ao espaço de escuta simbólica e tecnologias sensíveis.
            Aqui, o silêncio é informação. Descubra uma nova dimensão na interação humano-máquina,
            onde pausas e ritmos revelam a essência da comunicação.
        </p>
        <a href="login.html" class="btn-simbiose">Iniciar Simbiose</a>
    </div>
</body>
</html>
