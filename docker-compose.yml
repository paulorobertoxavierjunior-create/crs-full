version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: crs-postgres
    environment:
      POSTGRES_USER: crs_user
      POSTGRES_PASSWORD: crs_password
      POSTGRES_DB: crs_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crs_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: crs-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crs-backend
    environment:
      DATABASE_URL: postgresql://crs_user:crs_password@postgres:5432/crs_db
      REDIS_URL: redis://redis:6379/0
      FLASK_ENV: development
      DEBUG: "True"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    command: python main.py

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crs-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app

  adminer:
    image: adminer:latest
    container_name: crs-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  postgres_data:

networks:
  default:
    name: crs-network